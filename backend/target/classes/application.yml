spring:
  application:
    name: smartcampus
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/smartcampus}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: INFO
